# fly.toml app configuration file generated for hbk-pickle-api on 2026-03-22T22:36:08-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hbk-pickle-api'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = 'pnpm prisma migrate deploy'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[processes]
  api = 'node dist/app/server.js'
  notifications = 'node dist/jobs/notificationWorker.js'
  scheduler = 'node dist/jobs/schedulers/registrationTicker.js'
  sub_selection = 'node dist/jobs/subSelectionWorker.js'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['api']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
